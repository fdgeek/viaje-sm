<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje Familiar SM - Gastos</title>
    <meta name="description" content="Gastos compartidos del viaje familiar entre Daniel y Laura">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Gastos del Viaje Santa Marta</h1>
            <p>Daniel & Laura</p>
        </div>
    </header>

    <main id="app">
        <div class="loader" id="loader">Cargando datos...</div>
        <div id="data-container" class="hidden">
            <!-- Totals -->
            <section class="summary-card glass">
                <h2>Resumen total</h2>
                <div class="summary-stats">
                    <div class="stat">
                        <span class="label">Total Gastos</span>
                        <span class="value" id="global-total">$0</span>
                    </div>
                    <div class="stat">
                        <span class="label">Pendiente Daniel</span>
                        <span class="value" id="global-daniel">$0</span>
                    </div>
                    <div class="stat">
                        <span class="label">Pendiente Laura</span>
                        <span class="value" id="global-laura">$0</span>
                    </div>
                </div>
            </section>
            
            <!-- Grouped by Date -->
            <section id="dates-container" class="dates-list"></section>
        </div>
        <div id="error-message" class="error hidden">Hubo un error al cargar la información. Revisa tu conexión.</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
